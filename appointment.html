    <div id="confirmation">
      <h2>Appointment Confirmed!</h2>
      <div class="checkmark-animation">✓</div>
      <button onclick="goHome()">Back to Home</button>
    </div>
  </div>

  <script>
    const form = document.getElementById("appointment-form");
    const confirmation = document.getElementById("confirmation");
    const existingCheckbox = document.getElementById("existing_patient");
    const patientIdGroup = document.getElementById("patient-id-group");

    existingCheckbox.addEventListener("change", function () {
      patientIdGroup.style.display = this.checked ? "block" : "none";
    });

    form.addEventListener("submit", function (event) {
      event.preventDefault();
      const formData = new FormData(form);
      fetch("appointment.php", {
        method: "POST",
        body: formData,
      })
        .then((response) => response.text())
        .then((data) => {
          form.style.display = "none";
          confirmation.style.display = "block";
          document.querySelector(".checkmark-animation").classList.add("animate");
        })
        .catch((error) => {
          alert("There was an error booking your appointment.");
        });
    });

    function goHome() {
      window.location.href = "index.html";
    }
  </script>
